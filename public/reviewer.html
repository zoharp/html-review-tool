<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Tool — Reviewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #1a73e8;
    --green:  #34a853;
    --red:    #ea4335;
    --yellow: #f9a825;
    --bg:     #f8f9fa;
    --card:   #ffffff;
    --border: #e0e0e0;
    --text:   #202124;
    --muted:  #5f6368;
    --radius: 8px;
    --header: 52px;
    --sidebar:320px;
  }

  html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }

  /* ── Header ── */
  header {
    height: var(--header); background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.1);
  }
  .header-title { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .header-meta  { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .btn-sm { border: 1px solid var(--border); background: var(--bg); border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: var(--text); }
  .btn-sm:hover { background: var(--border); }

  /* ── Version bar ── */
  #version-bar {
    display: none; position: fixed; top: var(--header); left: 0; right: 0; z-index: 90;
    background: #fff; border-bottom: 1px solid var(--border); min-height: 36px;
    align-items: center; padding: 0 16px; gap: 6px; flex-wrap: wrap;
    font-size: 12px; color: var(--muted);
  }
  #version-bar.visible { display: flex; }
  .ver-tab {
    border: 1px solid var(--border); background: var(--bg); border-radius: 5px;
    padding: 3px 12px; font-size: 12px; cursor: pointer; color: var(--muted);
    white-space: nowrap;
  }
  .ver-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }
  .ver-tab.diff-tab.active { background: #6a1b9a; border-color: #6a1b9a; }
  .ver-tab:hover:not(.active) { background: var(--border); }
  #readonly-banner {
    display: none; position: absolute; top: 0; left: 0; right: 0;
    background: rgba(251,188,4,.15); border-bottom: 2px solid var(--yellow);
    text-align: center; font-size: 12px; color: #7a5200; padding: 4px;
    z-index: 5; pointer-events: none;
  }
  /* ── Track-changes diff view ── */
  #diff-wrap {
    display: none; flex: 1; overflow-y: auto; background: #fff; padding: 32px 48px;
  }
  #diff-content {
    max-width: 820px; margin: 0 auto; font-size: 14px; line-height: 1.8;
    font-family: Georgia, 'Times New Roman', serif; word-wrap: break-word;
  }
  #diff-content p { margin-bottom: 1em; }
  #diff-content ins { background: #e6ffed; color: #1b5e20; text-decoration: none; }
  #diff-content del { background: #ffeef0; color: #b31d28; }

  /* ── Layout ── */
  .layout {
    display: flex; position: fixed; top: var(--header); bottom: 0; left: 0; right: 0;
  }
  .layout.with-version-bar { top: calc(var(--header) + 36px); }

  /* ── iframe panel ── */
  .iframe-wrap {
    flex: 1; overflow: hidden; position: relative;
  }
  #review-frame {
    width: 100%; height: 100%; border: none; display: block;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar); flex-shrink: 0; background: var(--card);
    border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-header h3 { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .sidebar-header .count { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .ann-list { flex: 1; overflow-y: auto; padding: 8px; }

  /* ── Annotation card in sidebar ── */
  .ann-card {
    border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px;
    margin-bottom: 8px; cursor: pointer; transition: border-color .15s, box-shadow .15s; background: #fff;
  }
  .ann-card:hover { border-color: var(--blue); }
  .ann-card.highlighted { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(26,115,232,.2); }

  .ann-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .type-badge { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 2px 6px; text-transform: uppercase; }
  .badge-comment { background: #fff9c4; color: #f57f17; }
  .badge-change  { background: #fce4ec; color: #c62828; }
  .ann-who { font-size: 11px; color: var(--muted); margin-left: auto; }

  .ann-selected-text { font-size: 12px; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .ann-body { font-size: 13px; }
  .ann-change-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .old-text { color: var(--red); text-decoration: line-through; background: #fce4ec; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .new-text { color: var(--green); background: #e8f5e9; padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  .ann-status { font-size: 10px; font-weight: 600; border-radius: 10px; padding: 2px 7px; margin-top: 6px; display: inline-block; }
  .st-pending  { background: #fff3e0; color: #e65100; }
  .st-accepted { background: #e8f5e9; color: #1b5e20; }
  .st-rejected { background: #eeeeee; color: #616161; }

  .ann-delete { font-size: 11px; color: var(--red); cursor: pointer; margin-top: 6px; display: none; }
  .ann-delete:hover { text-decoration: underline; }
  .ann-card.mine .ann-delete { display: inline; }
  .ann-edit   { font-size: 11px; color: var(--blue); cursor: pointer; margin-top: 6px; display: none; margin-right: 10px; }
  .ann-edit:hover { text-decoration: underline; }
  .ann-card.mine.pending .ann-edit { display: inline; }

  /* Inline edit form */
  .edit-form { margin-top: 8px; display: none; }
  .edit-form.open { display: block; }
  .edit-form textarea { width: 100%; font-size: 13px; border: 1px solid var(--blue); border-radius: 6px; padding: 6px 8px; resize: vertical; font-family: inherit; outline: none; }
  .edit-form-btns { display: flex; gap: 6px; margin-top: 6px; }
  .edit-save-btn   { background: var(--blue); color: #fff; border: none; border-radius: 5px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  .edit-cancel-btn { background: none; border: 1px solid var(--border); border-radius: 5px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--muted); }

  .empty-ann { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 14px; line-height: 1.7; }

  /* ── Selection toolbar (floating over iframe) ── */
  #sel-toolbar {
    position: fixed; display: none; z-index: 200;
    background: #323232; border-radius: 8px; padding: 6px 8px; gap: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,.3); align-items: center;
    white-space: nowrap;
  }
  #sel-toolbar button {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
    color: #fff; border-radius: 5px; padding: 5px 12px; font-size: 12px; cursor: pointer;
    transition: background .12s;
  }
  #sel-toolbar button:hover { background: rgba(255,255,255,.22); }
  #sel-toolbar .sel-text { color: rgba(255,255,255,.6); font-size: 11px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }

  /* ── Annotation form modal ── */
  #ann-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
    align-items: center; justify-content: center; z-index: 300;
  }
  #ann-modal.open { display: flex; }
  .modal-card { background: #fff; border-radius: 12px; padding: 28px; width: 460px; max-width: calc(100vw - 32px); box-shadow: 0 12px 40px rgba(0,0,0,.25); }
  .modal-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal-card .preview { font-size: 13px; font-style: italic; background: #f5f5f5; border-left: 3px solid var(--border); padding: 6px 10px; border-radius: 4px; margin-bottom: 18px; color: var(--muted); max-height: 70px; overflow: hidden; }
  .modal-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  textarea { width: 100%; border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; font-size: 13px; outline: none; resize: vertical; min-height: 80px; font-family: inherit; transition: border-color .15s; }
  textarea:focus { border-color: var(--blue); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .btn-primary { background: var(--blue); color: #fff; border: none; border-radius: 7px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: #1557b0; }
  .btn-cancel  { background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 9px 16px; font-size: 13px; cursor: pointer; }
  .btn-cancel:hover { background: var(--border); }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 20px; right: 20px; background: #323232; color: #fff; border-radius: 8px; padding: 11px 18px; font-size: 13px; display: none; z-index: 400; box-shadow: 0 4px 12px rgba(0,0,0,.3); }
  #toast.show { display: block; animation: fadeIn .2s; }
  #toast.success { background: var(--green); }
  #toast.error   { background: var(--red); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Reply threads ── */
  .reply-thread { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; display: none; }
  .reply-thread.open { display: block; }
  .reply-msg { display: flex; gap: 6px; margin-bottom: 6px; }
  .reply-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px; }
  .reply-bubble { flex: 1; background: var(--bg); border-radius: 0 7px 7px 7px; padding: 5px 8px; font-size: 12px; }
  .reply-meta { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .reply-input-row { display: flex; gap: 5px; margin-top: 6px; }
  .reply-input-row input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 12px; outline: none; }
  .reply-input-row input:focus { border-color: var(--blue); }
  .reply-send-btn { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .reply-toggle { font-size: 11px; color: var(--blue); cursor: pointer; background: none; border: none; padding: 2px 0; margin-top: 4px; display: block; }
  .reply-toggle:hover { text-decoration: underline; }
  .reply-action-btn { font-size: 10px; color: var(--muted); cursor: pointer; margin-left: 8px; }
  .reply-action-btn:hover { color: var(--text); text-decoration: underline; }
  .reply-action-btn.reply-del:hover { color: var(--red); }
  /* ── Presence indicators ── */
  #presence-container { display: flex; gap: 8px; align-items: center; margin-right: 16px; }
  .presence-circle {
    width: 32px; height: 32px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 13px;
    font-weight: 700; color: #fff; position: relative; cursor: default;
  }
  .presence-tooltip {
    position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
    background: #2c3e50; color: #fff; padding: 8px 12px; border-radius: 6px;
    font-size: 12px; white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity .15s; z-index: 1001; font-weight: 400;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .presence-circle:hover .presence-tooltip { opacity: 1; }
  .presence-tooltip::before {
    content: ""; position: absolute; top: -6px; left: 50%;
    transform: translateX(-50%); border: 6px solid transparent;
    border-bottom-color: #2c3e50;
  }

  footer { position: fixed; bottom: 12px; right: 16px; font-size: 12px; color: rgba(0,0,0,.5); z-index: 999; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <span style="font-size:20px;">📋</span>
  <div class="header-title" id="file-title">Loading…</div>
  <div class="header-meta" id="user-meta"></div>
  <button class="btn-sm" onclick="doLogout()">Sign out</button>
  <div id="presence-container"></div>
</header>

<!-- ── Version bar ─────────────────────────────────────────── -->
<div id="version-bar">
  <span style="flex-shrink:0;margin-right:2px;">Version:</span>
  <div id="ver-tabs" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
  <button class="ver-tab diff-tab" id="ver-tab-diff" style="display:none;margin-left:8px;" onclick="switchToDiff()">🔀 Track Changes</button>
  <span id="readonly-label" style="margin-left:8px;color:#e65100;font-size:11px;display:none;">👁 Read-only</span>
</div>

<div class="layout" id="main-layout">
  <!-- iframe with the document -->
  <div class="iframe-wrap" id="iframe-wrap">
    <iframe id="review-frame" src="about:blank" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
  <!-- Track-changes diff panel (replaces iframe when active) -->
  <div id="diff-wrap">
    <div id="diff-content"></div>
  </div>

  <!-- Annotation sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h3>Annotations</h3>
      <div class="count" id="ann-count">—</div>
    </div>
    <div class="ann-list" id="ann-list">
      <div class="empty-ann">
        Select any text in the document to add a comment or suggest a change.
      </div>
    </div>
    <!-- Notification preference footer -->
    <div id="notif-footer" style="padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;background:#fafafa;">
      <span style="font-size:12px;color:var(--muted);flex:1;">📧 Email notifications</span>
      <div id="notif-toggle-track" onclick="toggleNotifPref()" style="width:36px;height:20px;border-radius:10px;background:#ccc;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;" title="Toggle email notifications">
        <div id="notif-toggle-thumb" style="width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);"></div>
      </div>
    </div>
  </aside>
</div>

<!-- ── Selection toolbar ────────────────────────────────────── -->
<div id="sel-toolbar">
  <span class="sel-text" id="sel-preview"></span>
  <button onclick="openModal('comment')">💬 Comment</button>
  <button onclick="openModal('change')">✏️ Suggest Change</button>
</div>

<!-- ── Annotation modal ─────────────────────────────────────── -->
<div id="ann-modal">
  <div class="modal-card">
    <h3 id="modal-title">Add Comment</h3>
    <div class="preview" id="modal-preview"></div>
    <div id="modal-comment-group">
      <div class="modal-label">Your comment</div>
      <textarea id="modal-comment" placeholder="Type your comment here…"></textarea>
    </div>
    <div id="modal-change-group" style="display:none;">
      <div class="modal-label">Suggested replacement text</div>
      <textarea id="modal-change" placeholder="Type the suggested replacement…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-submit" onclick="submitAnnotation()">Save</button>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
'use strict';

var fileId      = null;
var myEmail     = null;
var myInviteId  = null;
var annotations = [];
var pendingSelection = null;
var modalType   = null;
var activeAnnId = null;

// ── Boot ──────────────────────────────────────────────────────
var versionChain  = [];   // [{id,name,parent_id}] oldest→newest
var viewingFileId = null; // which version is currently shown
var diffMode      = false;

(async function boot(){
  const p = new URLSearchParams(location.search);
  fileId = p.get('fileId');

  try {
    const me = await api('GET', '/api/reviewer/me');
    myEmail = me.email;
    document.getElementById('user-meta').textContent = me.name ? me.name + ' (' + me.email + ')' : me.email;
    document.getElementById('file-title').textContent = me.file ? me.file.name : '—';
    if(!fileId && me.file) fileId = me.file.id;
    if(!fileId) throw new Error('No file');

    // Start presence tracking
    startPresenceTracking(fileId);

    // Load the document in the iframe
    document.getElementById('review-frame').src = '/api/reviewer/file/' + fileId;
    // Load annotations
    await loadAnnotations();
    // Load notification preference
    loadNotifPref();
    // Load revision chain
    loadRevisions();
  } catch(e){
    location.href = '/login.html';
  }
})();

async function loadRevisions(){
  try {
    const data = await api('GET', '/api/reviewer/revisions');
    if(!data.chain || data.chain.length < 2) return; // only one version — no bar needed
    versionChain  = data.chain;
    viewingFileId = data.current.id;
    document.getElementById('version-bar').classList.add('visible');
    document.getElementById('main-layout').classList.add('with-version-bar');
    document.getElementById('ver-tab-diff').style.display = 'inline-block';
    renderVersionTabs();
  } catch(e){}
}

function renderVersionTabs(){
  const tabsEl = document.getElementById('ver-tabs');
  tabsEl.innerHTML = versionChain.map(function(f, i){
    const vNum    = i + 1;
    const isLast  = i === versionChain.length - 1;
    const isViewing = f.id === viewingFileId && !diffMode;
    const label   = isLast ? ('v' + vNum + ' current ✓') : ('v' + vNum + ' — read only');
    return '<button class="ver-tab' + (isViewing ? ' active' : '') + '" onclick="switchVersion(\'' + f.id + '\')">' + label + '</button>';
  }).join('');
  // diff tab active state
  var diffBtn = document.getElementById('ver-tab-diff');
  if(diffBtn) diffBtn.classList.toggle('active', diffMode);
}

async function switchVersion(fId){
  if(fId === viewingFileId && !diffMode) return;
  diffMode      = false;
  viewingFileId = fId;

  const isLatest = versionChain.length > 0 && versionChain[versionChain.length-1].id === fId;
  const readonlyLabel = document.getElementById('readonly-label');
  const frame   = document.getElementById('review-frame');
  const toolbar = document.getElementById('sel-toolbar');

  // Hide diff panel, show iframe
  document.getElementById('diff-wrap').style.display  = 'none';
  document.getElementById('iframe-wrap').style.display = 'flex';

  renderVersionTabs();

  if(isLatest){
    readonlyLabel.style.display = 'none';
    frame.src = '/api/reviewer/file/' + fileId;
    await loadAnnotations();
  } else {
    readonlyLabel.style.display = 'inline';
    frame.src = '/api/reviewer/file/' + fId + '/readonly';
    const anns = await api('GET', '/api/reviewer/annotations/' + fId);
    annotations = anns;
    renderSidebar(true);
    if(toolbar) toolbar.style.display = 'none';
  }
}

// ── Track-changes diff view ────────────────────────────────────
async function switchToDiff(){
  if(diffMode) return;
  diffMode = true;
  renderVersionTabs();

  const chain = versionChain;
  if(chain.length < 2){ showToast('No previous version to compare'); return; }

  const currentId  = chain[chain.length - 1].id;
  const previousId = chain[chain.length - 2].id;

  document.getElementById('iframe-wrap').style.display = 'none';
  document.getElementById('diff-wrap').style.display   = 'flex';
  document.getElementById('readonly-label').style.display = 'none';
  document.getElementById('sel-toolbar').style.display    = 'none';
  document.getElementById('diff-content').innerHTML = '<em style="color:#888">Computing diff…</em>';

  try {
    const [oldHtml, newHtml] = await Promise.all([
      fetch('/api/reviewer/file/' + previousId + '/raw', {credentials:'include'}).then(r => r.text()),
      fetch('/api/reviewer/file/' + currentId  + '/raw', {credentials:'include'}).then(r => r.text()),
    ]);
    const oldText = htmlToText(oldHtml);
    const newText = htmlToText(newHtml);
    const ops = computeDiff(oldText, newText);
    document.getElementById('diff-content').innerHTML = renderDiffOps(ops);
  } catch(e){
    document.getElementById('diff-content').innerHTML = '<em style="color:red">Failed to load diff: ' + esc(e.message) + '</em>';
  }
}

function htmlToText(html){
  const doc = new DOMParser().parseFromString(html, 'text/html');
  doc.querySelectorAll('script,style').forEach(function(el){ el.remove(); });
  // Insert explicit paragraph separators so block boundaries survive innerText
  doc.querySelectorAll('p,div,h1,h2,h3,h4,h5,h6,li,br,tr').forEach(function(el){
    el.after(doc.createTextNode('\n'));
  });
  const raw = doc.body ? doc.body.innerText : '';
  // Normalise: collapse spaces/tabs, cap newline runs to max 2
  return raw.replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
}

function computeDiff(oldText, newText){
  // Tokenise into words + paragraph-break markers — whitespace variation is ignored
  function tok(s){
    const out = [];
    s.split(/(\n\n+)/).forEach(function(part){
      if(/^\n/.test(part)){ out.push('\n\n'); }
      else { const ws = part.match(/\S+/g); if(ws) out.push.apply(out, ws); }
    });
    return out;
  }
  var a = tok(oldText), b = tok(newText);
  const MAX = 4000;
  if(a.length > MAX) a = a.slice(0, MAX);
  if(b.length > MAX) b = b.slice(0, MAX);

  const m = a.length, n = b.length;
  const dp = new Array(m+1);
  for(var ii=0;ii<=m;ii++){ dp[ii] = new Int32Array(n+1); }
  for(var i=m-1;i>=0;i--)
    for(var j=n-1;j>=0;j--)
      dp[i][j] = a[i]===b[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
  const ops = [];
  var x=0, y=0;
  while(x<m || y<n){
    if(x<m && y<n && a[x]===b[y]){ ops.push({t:'=',s:a[x]}); x++; y++; }
    else if(y<n && (x>=m || dp[x][y+1]>=dp[x+1][y])){ ops.push({t:'+',s:b[y]}); y++; }
    else { ops.push({t:'-',s:a[x]}); x++; }
  }
  return ops;
}

function renderDiffOps(ops){
  let html = '<p>';
  ops.forEach(function(op){
    if(op.s === '\n\n'){
      // paragraph break: deleted breaks are silently dropped; new/same breaks split paragraphs
      if(op.t !== '-') html += '</p><p>';
    } else {
      const t = op.s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if(op.t==='=')  html += t + ' ';
      else if(op.t==='+') html += '<ins>'+t+'</ins> ';
      else                html += '<del>'+t+'</del> ';
    }
  });
  return html + '</p>';
}

// ── Annotations ────────────────────────────────────────────────
async function loadAnnotations(){
  if(!fileId) return;
  annotations = await api('GET', '/api/reviewer/annotations/' + fileId);
  renderSidebar();
  // Tell iframe to reload highlights
  const frame = document.getElementById('review-frame');
  frame.contentWindow && frame.contentWindow.postMessage({ type: 'reload-annotations' }, '*');
}

function renderSidebar(readOnly){
  const el = document.getElementById('ann-list');
  const ct = document.getElementById('ann-count');
  ct.textContent = annotations.length + ' annotation' + (annotations.length !== 1 ? 's' : '');

  const emptyMsg = readOnly
    ? '<div class="empty-ann">No annotations on this version.</div>'
    : '<div class="empty-ann">Select any text in the document to add a comment or suggest a change.</div>';
  if(!annotations.length){ el.innerHTML = emptyMsg; return; }

  el.innerHTML = annotations.map(a => {
    const isMine = !readOnly && a.reviewer_email === myEmail;
    const typeB  = a.type === 'comment'
      ? '<span class="type-badge badge-comment">💬 Comment</span>'
      : '<span class="type-badge badge-change">✏️ Change</span>';

    const body = a.type === 'comment'
      ? '<div class="ann-body">' + esc(a.comment) + '</div>'
      : `<div class="ann-change-row ann-body">
           <span class="old-text">${esc(a.selected_text)}</span>
           <span style="color:var(--muted)">→</span>
           <span class="new-text">${esc(a.suggested_text)}</span>
         </div>`;

    const statusBadge = a.status !== 'pending'
      ? `<span class="ann-status st-${a.status}">${a.status === 'accepted' ? '✓ Accepted' : '✗ Rejected'}</span>`
      : '<span class="ann-status st-pending">Pending review</span>';

    const isPending = a.status === 'pending';
    const editPlaceholder = a.type === 'comment' ? 'Edit your comment…' : 'Edit your suggested replacement…';
    const editCurrent     = a.type === 'comment' ? (a.comment || '') : (a.suggested_text || '');

    const replyInput = readOnly ? '' : `
        <div class="reply-input-row">
          <input type="text" id="reply-input-${a.id}" placeholder="Add a reply…"
                 onclick="event.stopPropagation()"
                 onkeydown="event.stopPropagation();if(event.key==='Enter') submitReply('${a.id}')">
          <button class="reply-send-btn" onclick="event.stopPropagation();submitReply('${a.id}')">↩</button>
        </div>`;

    return `<div class="ann-card ${isMine ? 'mine' : ''} ${isPending ? 'pending' : ''} ${a.id === activeAnnId ? 'highlighted' : ''}"
                 id="ann-card-${a.id}" onclick="focusAnnotation('${a.id}')">
      <div class="ann-card-header">
        ${typeB}
        <span class="ann-who">${esc(a.reviewer_name || a.reviewer_email.split('@')[0])}</span>
      </div>
      <div class="ann-selected-text">"${esc(a.selected_text)}"</div>
      <div id="ann-body-${a.id}">${body}</div>
      ${statusBadge}
      ${isMine && isPending ? `<span class="ann-edit" onclick="editAnn(event,'${a.id}')">✏️ Edit</span>` : ''}
      ${isMine ? `<span class="ann-delete" onclick="deleteAnn(event,'${a.id}')">🗑 Remove</span>` : ''}
      ${!readOnly ? `<div class="edit-form" id="edit-form-${a.id}" onclick="event.stopPropagation()">
        <textarea id="edit-input-${a.id}" rows="2" placeholder="${editPlaceholder}"
                  onkeydown="event.stopPropagation();if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();saveEdit('${a.id}','${a.type}')}"
        >${esc(editCurrent)}</textarea>
        <div class="edit-form-btns">
          <button class="edit-save-btn"   onclick="saveEdit('${a.id}','${a.type}')">Save</button>
          <button class="edit-cancel-btn" onclick="cancelEdit('${a.id}')">Cancel</button>
        </div>
      </div>` : ''}
      <button class="reply-toggle" onclick="event.stopPropagation();toggleReplies('${a.id}')">💬 Discussion <span id="reply-count-${a.id}"></span></button>
      <div class="reply-thread" id="reply-thread-${a.id}">
        <div id="reply-msgs-${a.id}"></div>
        ${replyInput}
      </div>
    </div>`;
  }).join('');
}

function focusAnnotation(id){
  activeAnnId = id;
  renderSidebar();
  // Scroll sidebar card into view
  const card = document.getElementById('ann-card-' + id);
  if(card) card.scrollIntoView({ behavior:'smooth', block:'nearest' });
  // Tell iframe to highlight
  const frame = document.getElementById('review-frame');
  frame.contentWindow && frame.contentWindow.postMessage({ type:'highlight-annotation', annotationId: id }, '*');
}

async function deleteAnn(e, id){
  e.stopPropagation();
  if(!confirm('Remove this annotation?')) return;
  await api('DELETE', '/api/reviewer/annotations/' + id);
  await loadAnnotations();
  showToast('Annotation removed');
}

function editAnn(e, id){
  e.stopPropagation();
  const form = document.getElementById('edit-form-' + id);
  if(!form) return;
  form.classList.add('open');
  const input = document.getElementById('edit-input-' + id);
  if(input){ input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
}

function cancelEdit(id){
  const form = document.getElementById('edit-form-' + id);
  if(form) form.classList.remove('open');
  // Restore original value from current annotation data
  const ann = annotations.find(a => a.id === id);
  if(ann){
    const input = document.getElementById('edit-input-' + id);
    if(input) input.value = ann.type === 'comment' ? (ann.comment || '') : (ann.suggested_text || '');
  }
}

async function saveEdit(id, type){
  const input = document.getElementById('edit-input-' + id);
  if(!input) return;
  const val = input.value.trim();
  if(!val){ showToast('Cannot save empty text'); return; }
  const body = type === 'comment' ? { comment: val } : { suggestedText: val };
  try {
    const updated = await api('PATCH', '/api/reviewer/annotations/' + id, body);
    // Update local cache
    const idx = annotations.findIndex(a => a.id === id);
    if(idx !== -1) annotations[idx] = updated;
    renderSidebar();
    showToast('Annotation updated');
  } catch(err){
    showToast('Error: ' + err.message);
  }
}

// ── Selection toolbar ──────────────────────────────────────────
window.addEventListener('message', function(e){
  if(!e.data) return;
  const frame = document.getElementById('review-frame');
  const iframeRect = frame.getBoundingClientRect();

  switch(e.data.type){
    case 'text-selected':
      pendingSelection = {
        selectedText:  e.data.selectedText,
        contextBefore: e.data.contextBefore,
        contextAfter:  e.data.contextAfter,
      };
      showToolbar(e.data.rect, iframeRect);
      break;

    case 'selection-data':
      // Response to get-selection poll (mouse released outside iframe)
      if (!pendingSelection && e.data.data && e.data.data.selectedText && e.data.data.rect) {
        pendingSelection = {
          selectedText:  e.data.data.selectedText,
          contextBefore: e.data.data.contextBefore,
          contextAfter:  e.data.data.contextAfter,
        };
        showToolbar(e.data.data.rect, iframeRect);
      }
      break;

    case 'clear-selection':
      pendingSelection = null;
      hideToolbar();
      break;

    case 'annotations-loaded':
      // Iframe has re-applied highlights — no action needed here
      break;

    case 'annotation-click':
      focusAnnotation(e.data.annotationId);
      break;
  }
});

function showToolbar(selRect, iframeRect){
  var tb = document.getElementById('sel-toolbar');
  var prev = document.getElementById('sel-preview');
  prev.textContent = '"' + (pendingSelection.selectedText.length > 40
    ? pendingSelection.selectedText.slice(0, 40) + '…'
    : pendingSelection.selectedText) + '"';

  // Position above the selection centre
  var x = iframeRect.left + selRect.left + (selRect.width / 2);
  var y = iframeRect.top  + selRect.top;

  tb.style.display = 'flex';
  // Let browser render first, then position
  requestAnimationFrame(function(){
    var tbW = tb.offsetWidth;
    var tbH = tb.offsetHeight;
    tb.style.left = Math.max(8, Math.min(x - tbW/2, window.innerWidth - tbW - 8)) + 'px';
    tb.style.top  = Math.max(8, y - tbH - 8) + 'px';
  });
}

function hideToolbar(){
  document.getElementById('sel-toolbar').style.display = 'none';
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(type){
  if(!pendingSelection){ toast('Please select some text first', 'error'); return; }
  modalType = type;
  hideToolbar();

  var title   = type === 'comment' ? '💬 Add Comment' : '✏️ Suggest a Change';
  var preview = '"' + pendingSelection.selectedText + '"';

  document.getElementById('modal-title').textContent   = title;
  document.getElementById('modal-preview').textContent = preview;
  document.getElementById('modal-comment').value = '';
  document.getElementById('modal-change').value  = '';

  document.getElementById('modal-comment-group').style.display = type === 'comment' ? 'block' : 'none';
  document.getElementById('modal-change-group').style.display  = type === 'change'  ? 'block' : 'none';

  document.getElementById('ann-modal').classList.add('open');
  setTimeout(function(){
    (type === 'comment'
      ? document.getElementById('modal-comment')
      : document.getElementById('modal-change')).focus();
  }, 50);
}

function closeModal(){
  document.getElementById('ann-modal').classList.remove('open');
  // Clear iframe selection
  var frame = document.getElementById('review-frame');
  frame.contentWindow && frame.contentWindow.postMessage({ type: 'clear-selection' }, '*');
  pendingSelection = null;
}

// Close modal on backdrop click
document.getElementById('ann-modal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

async function submitAnnotation(){
  if(!pendingSelection) return;

  var btn = document.getElementById('modal-submit');
  var comment     = document.getElementById('modal-comment').value.trim();
  var suggestedText = document.getElementById('modal-change').value.trim();

  if(modalType === 'comment' && !comment){ toast('Please enter a comment', 'error'); return; }
  if(modalType === 'change' && !suggestedText){ toast('Please enter your suggested replacement', 'error'); return; }

  btn.innerHTML = '<span class="spin"></span>';
  btn.disabled  = true;

  try {
    var body = {
      type:          modalType,
      selectedText:  pendingSelection.selectedText,
      contextBefore: pendingSelection.contextBefore,
      contextAfter:  pendingSelection.contextAfter,
    };
    if(modalType === 'comment') body.comment = comment;
    else body.suggestedText = suggestedText;

    var newAnn = await api('POST', '/api/reviewer/annotations', body);
    closeModal();
    await loadAnnotations();
    focusAnnotation(newAnn.id);
    toast('Annotation saved ✓', 'success');
  } catch(e){
    toast(e.message, 'error');
  } finally {
    btn.innerHTML = 'Save';
    btn.disabled  = false;
  }
}

// Ctrl/Cmd + Enter to submit modal
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter' && document.getElementById('ann-modal').classList.contains('open')){
    submitAnnotation();
  }
});

// ── Logout ─────────────────────────────────────────────────────
async function doLogout(){
  await fetch('/api/reviewer/logout', { method:'POST', credentials:'include' }).catch(()=>{});
  // Just clear cookie client-side by expiring, then redirect
  location.href = '/login.html';
}

// ── Notification Preference ─────────────────────────────────────
var notifOptedOut = false;

async function loadNotifPref(){
  try {
    var data = await api('GET', '/api/reviewer/notifications/status');
    notifOptedOut = data.optedOut;
    renderNotifToggle();
  } catch(e) {}
}

function renderNotifToggle(){
  var track = document.getElementById('notif-toggle-track');
  var thumb = document.getElementById('notif-toggle-thumb');
  if(!track) return;
  if(notifOptedOut){
    track.style.background = '#ccc';
    thumb.style.left = '3px';
    track.title = 'Email notifications OFF — click to enable';
  } else {
    track.style.background = '#34a853';
    thumb.style.left = '19px';
    track.title = 'Email notifications ON — click to disable';
  }
}

async function toggleNotifPref(){
  var next = !notifOptedOut;
  notifOptedOut = next;
  renderNotifToggle();
  try {
    await api('POST', '/api/reviewer/notifications/optout', { optOut: next });
    showToast(next ? '🔕 Email notifications disabled' : '🔔 Email notifications enabled');
  } catch(e) {
    notifOptedOut = !next; // revert
    renderNotifToggle();
    showToast('Failed to save preference');
  }
}

// ── Utilities ──────────────────────────────────────────────────
async function api(method, url, body){
  var opts = { method: method, credentials: 'include', headers: {} };
  if(body){ opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  var res = await fetch(url, opts);
  if(res.status === 401){ location.href = '/login.html'; throw new Error('Not authenticated'); }
  if(!res.ok){ var j = await res.json().catch(function(){ return {}; }); throw new Error(j.error || res.statusText); }
  return res.json().catch(function(){ return {}; });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type||'');
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.className = ''; }, 3000);
}
function showToast(msg){ toast(msg); }

function timeAgo(iso){
  if(!iso) return '';
  var normalised = iso.replace(' ', 'T').replace(/(\.\d+)?$/, 'Z');
  var s = Math.floor((Date.now() - new Date(normalised)) / 1000);
  if(s < 60)    return 'just now';
  if(s < 3600)  return Math.floor(s/60) + 'm ago';
  if(s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function avatarColor(str){
  var h = 0;
  for(var i=0;i<str.length;i++) h = ((h<<5)-h)+str.charCodeAt(i);
  var colors = ['#1a73e8','#34a853','#ea4335','#fbbc04','#9c27b0','#ff5722','#00bcd4'];
  return colors[Math.abs(h) % colors.length];
}

// ── Reply threads ──────────────────────────────────────────────
async function toggleReplies(annId){
  var thread = document.getElementById('reply-thread-' + annId);
  if(!thread) return;
  if(thread.classList.contains('open')){
    thread.classList.remove('open');
  } else {
    thread.classList.add('open');
    await loadReplies(annId);
  }
}

async function loadReplies(annId){
  try {
    var replies = await api('GET', '/api/reviewer/annotations/' + annId + '/replies');
    renderReplies(annId, replies);
    var countEl = document.getElementById('reply-count-' + annId);
    if(countEl) countEl.textContent = replies.length ? '(' + replies.length + ')' : '';
  } catch(e){ /* silent */ }
}

function renderReplies(annId, replies){
  var el = document.getElementById('reply-msgs-' + annId);
  if(!el) return;
  if(!replies.length){
    el.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:3px 0;">No replies yet.</div>';
    return;
  }
  el.innerHTML = replies.map(function(r){
    var isAdmin = r.author_role === 'admin';
    var bg = isAdmin ? '#1a73e8' : avatarColor(r.author_name || r.author_email || '?');
    var initial = (r.author_name || r.author_email || '?')[0].toUpperCase();
    var isMine = !isAdmin && r.author_email === myEmail;
    var actions = isMine
      ? '<span class="reply-action-btn" onclick="editReply(event,\'' + r.id + '\',\'' + annId + '\')">Edit</span>' +
        '<span class="reply-action-btn reply-del" onclick="deleteReply(event,\'' + r.id + '\',\'' + annId + '\')">Delete</span>'
      : '';
    return '<div class="reply-msg" id="reply-row-' + r.id + '">' +
      '<div class="reply-avatar" style="background:' + bg + ';">' + initial + '</div>' +
      '<div class="reply-bubble">' +
        '<div class="reply-meta">' + esc(r.author_name || (isAdmin ? 'Admin' : r.author_email)) + ' · ' + timeAgo(r.created_at) + actions + '</div>' +
        '<div id="reply-text-' + r.id + '">' + esc(r.message) + '</div>' +
        '<div id="reply-edit-form-' + r.id + '" style="display:none;">' +
          '<textarea id="reply-edit-input-' + r.id + '" rows="2" style="width:100%;font-size:12px;border:1px solid var(--blue);border-radius:4px;padding:4px 6px;font-family:inherit;resize:vertical;outline:none;">' + esc(r.message) + '</textarea>' +
          '<div style="display:flex;gap:5px;margin-top:4px;">' +
            '<button onclick="saveReply(event,\'' + r.id + '\',\'' + annId + '\')" style="background:var(--blue);color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;">Save</button>' +
            '<button onclick="cancelReplyEdit(event,\'' + r.id + '\')" style="background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;">Cancel</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function editReply(e, replyId, annId){
  e.stopPropagation();
  document.getElementById('reply-text-' + replyId).style.display = 'none';
  document.getElementById('reply-edit-form-' + replyId).style.display = 'block';
  var inp = document.getElementById('reply-edit-input-' + replyId);
  if(inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

function cancelReplyEdit(e, replyId){
  e.stopPropagation();
  document.getElementById('reply-text-' + replyId).style.display = '';
  document.getElementById('reply-edit-form-' + replyId).style.display = 'none';
}

async function saveReply(e, replyId, annId){
  e.stopPropagation();
  var inp = document.getElementById('reply-edit-input-' + replyId);
  var msg = inp ? inp.value.trim() : '';
  if(!msg){ showToast('Cannot save empty reply'); return; }
  try {
    await api('PATCH', '/api/reviewer/replies/' + replyId, { message: msg });
    await loadReplies(annId);
  } catch(err){ toast(err.message, 'error'); }
}

async function deleteReply(e, replyId, annId){
  e.stopPropagation();
  if(!confirm('Delete this reply?')) return;
  try {
    await api('DELETE', '/api/reviewer/replies/' + replyId);
    await loadReplies(annId);
  } catch(err){ toast(err.message, 'error'); }
}

async function submitReply(annId){
  var input = document.getElementById('reply-input-' + annId);
  if(!input) return;
  var body = input.value.trim();
  if(!body) return;
  try {
    await api('POST', '/api/reviewer/annotations/' + annId + '/replies', { message: body });
    input.value = '';
    await loadReplies(annId);
  } catch(e){ toast(e.message, 'error'); }
}

// ── Presence Tracking ──────────────────────────────────────────
var presenceFileId = null;
var presenceUserId = null;
var presencePollInterval = null;

function updatePresenceDisplay(users){
  var container = document.getElementById('presence-container');
  if(!users || users.length === 0){
    container.innerHTML = '';
    return;
  }
  var colors = ['#667eea', '#f093fb', '#4facfe', '#43e97b', '#fa709a'];
  var html = users.map(function(u, i){
    if(u.userId === presenceUserId) return '';
    var c = colors[i % colors.length];
    return '<div class="presence-circle" style="background:' + c + ';">' + u.initial + '<div class="presence-tooltip">' + u.name + ' (' + u.email + ')</div></div>';
  }).filter(Boolean).join('');
  container.innerHTML = html;
}

async function pollPresence(){
  if(!presenceFileId) return;
  try {
    var res = await fetch('/api/presence/active/' + presenceFileId);
    if(res.ok){
      updatePresenceDisplay(await res.json());
    }
  } catch(e) {}
}

async function setPresenceActive(){
  if(!presenceFileId || !presenceUserId) return;
  try {
    await api('POST', '/api/presence/set-active', { fileId: presenceFileId });
  } catch(e) {}
}

function startPresenceTracking(fileId){
  presenceFileId = fileId;
  if(!presenceUserId){
    presenceUserId = localStorage.getItem('rv_userId');
    if(!presenceUserId){
      presenceUserId = 'u_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('rv_userId', presenceUserId);
    }
  }
  if(presencePollInterval) clearInterval(presencePollInterval);
  setPresenceActive();
  presencePollInterval = setInterval(function(){
    pollPresence();
    setPresenceActive();
  }, 2000);
}

function stopPresenceTracking(){
  presenceFileId = null;
  if(presencePollInterval) clearInterval(presencePollInterval);
  updatePresenceDisplay([]);
}
