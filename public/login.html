<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Tool — Reviewer Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 44px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 12px 40px rgba(0,0,0,.25);
  }
  .logo { font-size: 36px; margin-bottom: 12px; }
  h2 { font-size: 24px; font-weight: 700; color: #202124; margin-bottom: 6px; }
  .sub { color: #5f6368; font-size: 14px; margin-bottom: 32px; line-height: 1.5; }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #5f6368; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  input {
    width: 100%; border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px 14px;
    font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s; color: #202124;
  }
  input:focus { border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.15); }
  input[readonly] { background: #f8f9fa; }

  .btn {
    width: 100%; background: #1a73e8; color: #fff; border: none; border-radius: 8px;
    padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover { background: #1557b0; }
  .btn:disabled { background: #aaa; cursor: default; }

  .error { color: #ea4335; font-size: 13px; margin-top: 12px; text-align: center; min-height: 18px; }

  .note {
    margin-top: 24px; padding: 12px 14px; background: #f8f9fa;
    border-radius: 8px; font-size: 13px; color: #5f6368; line-height: 1.6;
  }
  .spin { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { position: fixed; bottom: 12px; left: 16px; font-size: 11px; color: rgba(0,0,0,.4); z-index: 999; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">📋</div>
  <h2>Document Review</h2>
  <p class="sub">Enter your email and the invite code from your invitation email to access the review tool.</p>

  <div class="form-group">
    <label>Your Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label>Invite Code</label>
    <input type="text" id="code" placeholder="Paste your invite code" autocomplete="off" spellcheck="false">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">Open Review Tool →</button>
  <div class="error" id="err-msg"></div>

  <div class="note">
    🔗 If you arrived via your invite email, your code should already be filled in.
  </div>
</div>

<script>
'use strict';
// Pre-fill from URL params
(function(){
  const p = new URLSearchParams(location.search);
  if(p.get('email')) document.getElementById('email').value = p.get('email');
  if(p.get('code'))  document.getElementById('code').value  = p.get('code');
})();

async function doLogin(){
  const email      = document.getElementById('email').value.trim();
  const inviteCode = document.getElementById('code').value.trim();
  const errEl      = document.getElementById('err-msg');
  const btn        = document.getElementById('login-btn');

  errEl.textContent = '';
  if(!email || !inviteCode){ errEl.textContent = 'Please fill in both fields.'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Verifying…';

  try {
    const res = await fetch('/api/reviewer/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, inviteCode }),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Authentication failed');
    // Success — go to reviewer page
    location.href = '/reviewer.html?fileId=' + data.fileId;
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.innerHTML = 'Open Review Tool →';
  }
}

document.addEventListener('keydown', e => e.key === 'Enter' && doLogin());
</script>
<script>
fetch('/api/version').then(r => r.json()).then(d => {
  const footer = document.querySelector('footer');
  if(footer) footer.innerHTML = 'v' + d.version;
}).catch(() => {});
</script>

<footer></footer>
</body>
</html>
